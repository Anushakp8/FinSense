name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: finsense
          POSTGRES_PASSWORD: finsense_secret
          POSTGRES_DB: finsense
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finsense -d finsense"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL_SYNC: postgresql+psycopg2://finsense:finsense_secret@localhost:5432/finsense
      DATABASE_URL: postgresql+asyncpg://finsense:finsense_secret@localhost:5432/finsense
      REDIS_URL: redis://localhost:6379/0
      API_REQUIRE_KEY: "false"

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import time
          import psycopg2

          for attempt in range(30):
              try:
                  conn = psycopg2.connect(
                      host="localhost",
                      port=5432,
                      user="finsense",
                      password="finsense_secret",
                      dbname="finsense",
                  )
                  conn.close()
                  print("PostgreSQL is ready")
                  break
              except Exception:
                  if attempt == 29:
                      raise
                  time.sleep(2)
          PY

      - name: Run migrations
        run: alembic upgrade head

      - name: Run unit tests
        run: pytest -q -m "not integration"

      - name: Run integration tests
        run: pytest -q -m integration
